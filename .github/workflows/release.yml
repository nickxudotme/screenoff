name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the leading v, for example 0.1.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    env:
      GH_TOKEN: ${{ github.token }}
      TAP_DEPLOY_KEY: ${{ secrets.TAP_DEPLOY_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          TAG="v${VERSION}"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "TAG=${TAG}" >> "$GITHUB_ENV"

      - name: Run tests
        run: swift test

      - name: Update bundle version
        run: |
          set -euo pipefail
          plutil -replace CFBundleShortVersionString -string "$VERSION" Resources/ScreenOff-Info.plist
          plutil -replace CFBundleVersion -string "$GITHUB_RUN_NUMBER" Resources/ScreenOff-Info.plist

      - name: Build app bundle
        run: ./scripts/build-release.sh

      - name: Verify app bundle
        run: |
          set -euo pipefail
          test -x dist/ScreenOff.app/Contents/MacOS/ScreenOffApp
          test -x dist/ScreenOff.app/Contents/Resources/screenoff
          test -f dist/ScreenOff.app/Contents/Resources/ScreenOff.icns
          test "$(plutil -extract CFBundleIconFile raw dist/ScreenOff.app/Contents/Info.plist)" = "ScreenOff"
          test "$(plutil -extract CFBundleShortVersionString raw dist/ScreenOff.app/Contents/Info.plist)" = "$VERSION"

      - name: Package zip
        run: |
          set -euo pipefail
          ZIP="dist/ScreenOff-${VERSION}.zip"
          rm -f "$ZIP"
          ditto -c -k --sequesterRsrc --keepParent dist/ScreenOff.app "$ZIP"
          SHA256="$(shasum -a 256 "$ZIP" | awk '{print $1}')"
          echo "ZIP=${ZIP}" >> "$GITHUB_ENV"
          echo "SHA256=${SHA256}" >> "$GITHUB_ENV"
          {
            echo "## ScreenOff ${VERSION}"
            echo
            echo "Unsigned macOS build."
            echo
            PREVIOUS_TAG="$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)"
            if [ -n "$PREVIOUS_TAG" ]; then
              echo "Changes since ${PREVIOUS_TAG}:"
              echo
              git log --pretty='- %s' "${PREVIOUS_TAG}..${TAG}"
              echo
            fi
            echo "SHA-256:"
            echo
            echo "\`\`\`"
            echo "${SHA256}"
            echo "\`\`\`"
          } > release-notes.md

      - name: Ensure tag exists
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          if ! git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Publish GitHub release
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ZIP" --clobber
          else
            gh release create "$TAG" "$ZIP" \
              --title "ScreenOff ${VERSION}" \
              --notes-file release-notes.md
          fi

      - name: Update Homebrew tap
        if: env.TAP_DEPLOY_KEY != ''
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$TAP_DEPLOY_KEY" > ~/.ssh/screenoff_homebrew_tap
          chmod 600 ~/.ssh/screenoff_homebrew_tap
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/screenoff_homebrew_tap -o IdentitiesOnly=yes"
          rm -rf /tmp/homebrew-tap
          git clone "git@github.com:nickxudotme/homebrew-tap.git" /tmp/homebrew-tap
          cd /tmp/homebrew-tap
          perl -0pi -e 's/version ".*?"/version "$ENV{VERSION}"/' Casks/screenoff.rb
          perl -0pi -e 's/sha256 ".*?"/sha256 "$ENV{SHA256}"/' Casks/screenoff.rb
          ruby -c Casks/screenoff.rb
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/screenoff.rb
          if git diff --cached --quiet; then
            echo "Homebrew tap is already up to date."
          else
            git commit -m "Update ScreenOff to ${VERSION}"
            git push
          fi

      - name: Homebrew tap deploy key notice
        if: env.TAP_DEPLOY_KEY == ''
        run: |
          echo "TAP_DEPLOY_KEY is not configured, so the Homebrew tap was not updated automatically."
